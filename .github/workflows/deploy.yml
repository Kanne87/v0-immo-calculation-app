name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            AUTHENTIK_CLIENT_ID=${{ secrets.AUTHENTIK_CLIENT_ID }}
            AUTHENTIK_CLIENT_SECRET=${{ secrets.AUTHENTIK_CLIENT_SECRET }}
            AUTH_SECRET=${{ secrets.AUTH_SECRET }}
            AUTH_URL=${{ secrets.AUTH_URL }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      COOLIFY_UUID: mwgwsgkswokk8wkgw4w848s4
    steps:
      - name: Update image tag to SHA and deploy
        run: |
          SHA_TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          echo "Deploying image tag: $SHA_TAG"
          # Update Coolify app to use exact SHA tag (avoids Docker cache issues with :latest)
          curl -sf -X PATCH "https://coolify.kailohmann.de/api/v1/applications/$COOLIFY_UUID" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"docker_registry_image_tag\": \"$SHA_TAG\"}"
          # Deploy with the new tag
          curl -sf -X POST "https://coolify.kailohmann.de/api/v1/deploy" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"uuid\": \"$COOLIFY_UUID\", \"force\": true}"
